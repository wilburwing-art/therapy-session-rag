# Prometheus scrape config for the local observability stack.
#
# The only real target is the OTEL Collector's Prometheus exporter on
# :8889, which exposes metrics pushed by the API + workers via OTLP.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: therapyrag-local
    environment: development

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
